# Minimal HTTP-only vhost to obtain the first Let's Encrypt cert for uat.gemura.rw.
# Steps:
#   1. Push this file to nginx (as uat-gemura-bootstrap.conf) and reload
#   2. Run certbot to issue the cert
#   3. Remove this file and push the full gemura-orora.conf (which has the 443 block)
# This file is only needed once — when the cert does not yet exist.

server {
    listen 80;
    listen [::]:80;
    server_name uat.gemura.rw;

    location /.well-known/acme-challenge/ {
        default_type "text/plain";
        root /var/www/html;
    }

    location / {
        return 404;
    }
}
